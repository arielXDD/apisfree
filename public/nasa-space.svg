<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Space fallback image</title>
  <desc id="desc">A deep space scene with stars, a planet, and a bright nebula.</desc>
  <defs>
    <radialGradient id="nebula" cx="58%" cy="36%" r="58%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.9" />
      <stop offset="24%" stop-color="#2563eb" stop-opacity="0.55" />
      <stop offset="48%" stop-color="#7c3aed" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="planet" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="26%" stop-color="#93c5fd" />
      <stop offset="58%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0" />
      <stop offset="18%" stop-color="#e0f2fe" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#f8fafc" stop-opacity="0.95" />
      <stop offset="82%" stop-color="#e0f2fe" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#030712" />
  <rect width="1600" height="900" fill="url(#nebula)" />
  <circle cx="1230" cy="160" r="210" fill="#38bdf8" opacity="0.1" filter="url(#soft)" />
  <circle cx="260" cy="700" r="260" fill="#f59e0b" opacity="0.08" filter="url(#soft)" />

